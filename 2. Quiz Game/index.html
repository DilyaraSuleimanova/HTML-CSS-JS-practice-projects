<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <div class="screen active" id="start-screen">
            <h1>Start quiz</h1>
            <p>Start quiz to check your knowledge</p>
            <button id="start-btn">Start!</button>
        </div>

        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Questions....</h2>

                <div class="quiz-info">
                    <p>Question <span id="current-question">1</span> of <span id="total-question">5</span></p>
                    <p>Score: <span id="score">0</span></p>
                </div>
            </div>

            <div class="quiestion-answer" id="quiestion-answer">

            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>


        <div class="screen" id="result-screen">
            <h1>Quiz Result</h1>

            <div class="quiz-result">
                <p>Your score is <span id="final-score">0</span> out of <span id="total-score">5</span></p>
                <p id="message">Message...</p>
            </div>

            <div class="buttons">
                <button id="restart-btn">Restart</button>
                <button id="home-btn">Start page</button>
            </div>
        </div>

    </div>


    <script src="script.js"></script>
</body>
</html>
