<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Miranda+Sans:regular,500,600,700,italic,500italic,600italic,700italic" rel="stylesheet" />
    <title>Expense Tracker</title>
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>

        <div class="balance-container">
            <h2>Your balance</h2>
            <h3 id="balance">0.00</h3>

            <div class="summary">
                <div class="income">
                    <h3>Income</h3>
                    <p class="income-amount">0.00</p>
                </div>
                <div class="expenses">
                    <h3>Expenses</h3>
                    <p class="expense-amount">0.00</p>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="transaction-container">
                <h2>Transactions</h2>
                <ul id="transaction-list">
                    <!-- TRANSACTIONS WILL BE HERE THROUGH JS -->
                </ul>
            </div>
            <div class="form-container">
                <h2>Add transaction</h2>

                <form action="" id="transaction-form">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" placeholder="Enter description..." id="description" required>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" placeholder="Enter amount..." id="amount" required>
                        <small>Use negative (-) for expenses</small>
                    </div>

                    <button type="submit">Add transaction</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
