<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color palette generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1><font>Color Palette</font> Generator</h1>

        <button id="generate-btn">
            <i class="fa-solid fa-arrows-rotate"></i>
            Generate Palette
        </button>


        <div class="palette-container">
            <!-- COLOR BOX 1 -->
             <div class="color-box">
                <div class="color" style="background-color: #dffaaa;"></div>
                <div class="color-info">
                    <span class="hex-value">#dffaaa</span>
                    <i class="fa-regular fa-copy copy-btn" title="Copy value"></i>
                </div>
             </div>
             
            <!-- COLOR BOX 2 -->
             <div class="color-box">
                <div class="color" style="background-color: #aaf6fa;"></div>
                <div class="color-info">
                    <span class="hex-value">#aaf6fa</span>
                    <i class="fa-regular fa-copy copy-btn" title="Copy value"></i>
                </div>
             </div>

            <!-- COLOR BOX 3 -->
             <div class="color-box">
                <div class="color" style="background-color: #4d6f09;"></div>
                <div class="color-info">
                    <span class="hex-value">#4d6f09</span>
                    <i class="fa-regular fa-copy copy-btn" title="Copy value"></i>
                </div>
             </div>

            <!-- COLOR BOX 4 -->
             <div class="color-box">
                <div class="color" style="background-color: #771c80;"></div>
                <div class="color-info">
                    <span class="hex-value">#771c80</span>
                    <i class="fa-regular fa-copy copy-btn" title="Copy value"></i>
                </div>
             </div>

            <!-- COLOR BOX 5 -->
             <div class="color-box">
                <div class="color" style="background-color: #941111;"></div>
                <div class="color-info">
                    <span class="hex-value">#941111</span>
                    <i class="fa-regular fa-copy copy-btn" title="Copy value"></i>
                </div>
             </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
